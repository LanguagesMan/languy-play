<!doctype html>
<html lang="es">
<head>
<meta name="robots" content="noindex,nofollow">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0F1724" />
  <title>Command Empire — Languy</title>
  <style>
    :root {
      --navy: #0F1724; --navy-soft: #1A2540; --navy-deep: #0A1020; --outline: #0A1A2A;
      --accent: #3B82F6; --accent-light: #60A5FA; --mint: #34D399;
      --gold: #FACC15; --blush: #F47C5C; --paper: #F1F4F9;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      background: var(--navy-deep); color: var(--paper);
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
    }
    #app { height: 100dvh; max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; }

    #hud {
      display: flex; gap: 8px; align-items: center; padding: 8px 10px;
      font-size: 13px; font-weight: 700; background: var(--navy); flex-wrap: wrap;
      border-bottom: 2px solid var(--outline);
    }
    #hud .grow { flex: 1; }
    #hud span { white-space: nowrap; }
    #hud-season { color: var(--gold); }
    #hud-xp { color: var(--accent-light); }
    #hud-pain { color: var(--blush); }
    #hud .pop { animation: pop .35s ease; display: inline-block; }
    @keyframes pop { 40% { transform: scale(1.45); } }

    #world { flex: 1; width: 100%; display: block; min-height: 0; }

    #advisor {
      display: flex; gap: 10px; align-items: center; padding: 6px 10px;
      background: var(--navy); border-top: 2px solid var(--outline); min-height: 64px;
    }
    #languy { width: 56px; height: 56px; flex: none; }
    #advisor.talking #languy { animation: talk .4s ease infinite alternate; }
    @keyframes talk { to { transform: translateY(-2px) rotate(-2deg); } }
    #advisor-es { font-size: 15px; font-weight: 800; line-height: 1.25; }
    #advisor-en { font-size: 11px; opacity: .55; margin-top: 1px; }

    #bar { background: var(--navy); padding: 6px 0 max(8px, env(safe-area-inset-bottom)); }
    #chips {
      display: flex; gap: 8px; overflow-x: auto; padding: 4px 10px 8px;
      scrollbar-width: none;
    }
    #chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: none; min-height: 44px; min-width: 44px; padding: 6px 12px;
      border-radius: 12px; border: 2px solid var(--outline);
      background: var(--navy-soft); color: var(--paper);
      font-size: 13px; font-weight: 800; display: flex; gap: 6px; align-items: center;
      cursor: pointer; transition: transform .08s;
    }
    .chip:active { transform: scale(.94); }
    .chip .icon { font-size: 16px; }
    .chip.mastered { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(250,204,21,.35); }
    .chip.new { animation: chipin .8s cubic-bezier(.2,1.6,.4,1); }
    @keyframes chipin { from { transform: scale(0); } }
    .chip.pulse { animation: pulse 1s ease infinite; border-color: var(--mint); }
    @keyframes pulse { 50% { box-shadow: 0 0 14px rgba(52,211,153,.8); transform: scale(1.06); } }
    .chip.casting { opacity: .5; }

    #input-row { display: flex; gap: 8px; padding: 0 10px; }
    #cmd {
      flex: 1; min-height: 44px; border-radius: 12px; border: 2px solid var(--outline);
      background: var(--navy-soft); color: var(--paper); padding: 0 12px;
      font-size: 15px; font-weight: 700; outline: none;
    }
    #cmd:focus { border-color: var(--accent); }
    #cmd::placeholder { color: rgba(241,244,249,.4); font-weight: 600; }
    #mic, #go {
      min-width: 48px; min-height: 44px; border-radius: 12px; border: 2px solid var(--outline);
      background: var(--accent); color: var(--paper); font-size: 18px; cursor: pointer;
    }
    #mic.listening { background: var(--blush); animation: pulse 1s infinite; }
    #mic.off { opacity: .35; }
    #go { background: var(--mint); color: var(--navy-deep); font-weight: 900; }

    #overlay {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(10,16,32,.86); z-index: 50; padding: 20px;
    }
    #overlay.show { display: flex; }
    #overlay .card {
      background: var(--navy); border: 2px solid var(--accent); border-radius: 18px;
      padding: 28px 22px; text-align: center; max-width: 380px; width: 100%;
      animation: chipin .5s cubic-bezier(.2,1.6,.4,1);
    }
    #overlay .big { font-size: 26px; font-weight: 900; margin-bottom: 12px; color: var(--gold); }
    #overlay .sub { font-size: 15px; line-height: 1.5; opacity: .9; margin-bottom: 14px; }
    #overlay .stats { font-size: 13px; font-weight: 800; margin-bottom: 18px; color: var(--accent-light); }
    #overlay button {
      min-height: 48px; padding: 0 28px; font-size: 16px; font-weight: 900;
      border-radius: 14px; border: none; background: var(--mint); color: var(--navy-deep); cursor: pointer;
    }
    #overlay button:active { transform: scale(.96); }
  </style>
  <script type="module" crossorigin src="./assets/index-DQA3zJnP.js"></script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <span id="hud-season">🌸 PRIMAVERA · 10:00</span>
      <span class="grow"></span>
      <span id="hud-wood">🪵0</span>
      <span id="hud-food">🍓10</span>
      <span id="hud-water">💧2</span>
      <span id="hud-pop">👥5/5</span>
      <span id="hud-xp">⚡0</span>
      <span id="hud-pain">🧠0</span>
    </div>
    <canvas id="world"></canvas>
    <div id="advisor">
      <canvas id="languy"></canvas>
      <div>
        <div id="advisor-es">…</div>
        <div id="advisor-en"></div>
      </div>
    </div>
    <div id="bar">
      <div id="chips"></div>
      <div id="input-row">
        <input id="cmd" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
               placeholder="escribe un comando… (¡recoge madera!)" />
        <button id="mic" aria-label="mantén para hablar">🎤</button>
        <button id="go" aria-label="enviar">▶</button>
      </div>
    </div>
  </div>
  <div id="overlay"></div>
</body>
</html>
